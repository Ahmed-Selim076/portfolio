<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" fill="#020409"/>
  <!-- chip pins -->
  <g stroke="#3da9ff" stroke-width="1.4" stroke-linecap="round">
    <line x1="9" y1="3" x2="9" y2="7"/>
    <line x1="16" y1="3" x2="16" y2="7"/>
    <line x1="23" y1="3" x2="23" y2="7"/>
    <line x1="9" y1="25" x2="9" y2="29"/>
    <line x1="16" y1="25" x2="16" y2="29"/>
    <line x1="23" y1="25" x2="23" y2="29"/>
    <line x1="3" y1="9" x2="7" y2="9"/>
    <line x1="3" y1="16" x2="7" y2="16"/>
    <line x1="3" y1="23" x2="7" y2="23"/>
    <line x1="25" y1="9" x2="29" y2="9"/>
    <line x1="25" y1="16" x2="29" y2="16"/>
    <line x1="25" y1="23" x2="29" y2="23"/>
  </g>
  <!-- chip body -->
  <rect x="7" y="7" width="18" height="18" rx="2.5" fill="#0a6cff" fill-opacity="0.12" stroke="#3da9ff" stroke-width="1.6"/>
  <!-- inner core -->
  <rect x="12" y="12" width="8" height="8" rx="1" fill="#3da9ff"/>
</svg>
